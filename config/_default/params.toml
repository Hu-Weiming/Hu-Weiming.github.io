# Blowfish Theme Params

colorScheme = "ocean"
defaultAppearance = "dark"
autoSwitchAppearance = true
enableSearch = true
enableCodeCopy = true

# Homepage
[homepage]
  layout = "profile"
  homepageImage = ""
  showRecent = true
  showRecentItems = 8
  showMoreLink = true
  showMoreLinkDest = "/posts"
  cardView = true
  cardViewScreenWidth = false
  layoutBackgroundBlur = true

# Article
[article]
  showDate = true
  showViews = false
  showLikes = false
  showDateUpdated = false
  showAuthor = false
  showHero = false
  showBreadcrumbs = true
  showDraftLabel = true
  showEdit = false
  showHeadingAnchors = true
  showPagination = true
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showWordCount = true
  showSummary = true
  sharingLinks = false

# List
[list]
  showBreadcrumbs = false
  showViews = false
  showLikes = false
  showTableOfContents = false
  showSummary = true
  showCards = true
  groupByYear = true
  cardView = true
  cardViewScreenWidth = false

# Taxonomy
[taxonomy]
  showTermCount = true
  showHero = false
  showBreadcrumbs = false
  showViews = false
  showLikes = false
  showTableOfContents = false
  cardView = false

# Sitemap
[sitemap]
  excludedKinds = []

# Header
[header]
  layout = "basic"

# Footer
[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = true
  showScrollToTop = true
